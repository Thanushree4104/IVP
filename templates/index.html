<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Watermarking</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f6f8;
            margin: 0;
            color: #1a1a1a;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background: #1a1a1a;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Digital Image Watermarking</h1>
    <div class="subtitle">
        Embed and extract invisible watermarks using DCT-based image processing.
    </div>

    <div class="card">
        <h2>Embed Watermark</h2>
        <form action="/embed" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <input type="text" name="watermark" placeholder="Watermark text" required>
            <button type="submit">Embed</button>
        </form>
    </div>

    <div class="card">
        <h2>Extract Watermark</h2>
        <form action="/extract" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <input type="number" name="length" placeholder="Watermark length" required>
            <button type="submit">Extract</button>
        </form>
    </div>

    <div class="footer">
        DCT Frequency-Domain Watermarking • IVP Project
    </div>

</div>

</body>
</html>
