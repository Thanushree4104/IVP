<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Watermarking</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f7f7f8;
        margin: 0;
        color: #111;
    }

    .container {
        max-width: 900px;
        margin: 60px auto;
        padding: 20px;
    }

    h1 {
        font-size: 30px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 35px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .card {
        background: #ffffff;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        transition: 0.2s ease;
    }

    .card:hover {
        box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    h2 {
        font-size: 17px;
        font-weight: 500;
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        background: #fafafa;
    }

    input:focus {
        outline: none;
        border-color: #6366f1;
        background: #fff;
    }

    button {
        width: 100%;
        padding: 11px;
        border-radius: 6px;
        border: none;
        background: #111;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #2a2a2a;
    }

    .badge {
        display: inline-block;
        font-size: 12px;
        background: #eef2ff;
        color: #4f46e5;
        padding: 4px 8px;
        border-radius: 6px;
        margin-bottom: 10px;
    }

    .footer {
        margin-top: 40px;
        font-size: 13px;
        color: #9ca3af;
        text-align: center;
    }

    @media (max-width: 700px) {
        .grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>Digital Image Watermarking</h1>
    <div class="subtitle">
        Frequency-domain watermarking using Discrete Cosine Transform (DCT)
    </div>

    <div class="grid">

        <!-- Embed -->
        <div class="card">
            <div class="badge">Embedding</div>
            <h2>Embed Watermark</h2>
            <form action="/embed" method="post" enctype="multipart/form-data">
                <input type="file" name="image" required>
                <input type="text" name="watermark" placeholder="Enter watermark text" required>
                <button type="submit">Embed Watermark</button>
            </form>
        </div>

        <!-- Extract -->
        <div class="card">
            <div class="badge">Extraction</div>
            <h2>Extract Watermark</h2>
            <form action="/extract" method="post" enctype="multipart/form-data">
                <input type="file" name="image" required>
                <input type="number" name="length" placeholder="Watermark length" required>
                <button type="submit">Extract Watermark</button>
            </form>
        </div>

    </div>

    <div class="footer">
        Invisible watermarking • Robust to compression • IVP Project
    </div>

</div>

</body>
</html>
