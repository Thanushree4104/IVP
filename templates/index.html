<!DOCTYPE html>
<html>
<head>
    <title>Digital Watermarking</title>
</head>
<body>

<h2>Embed Watermark</h2>
<form action="/embed" method="post" enctype="multipart/form-data">
    <input type="file" name="image" required><br><br>
    <input type="text" name="watermark" placeholder="Enter watermark text" required><br><br>
    <button type="submit">Embed</button>
</form>

<hr>

<h2>Extract Watermark</h2>
<form action="/extract" method="post" enctype="multipart/form-data">
    <input type="file" name="image" required><br><br>
    <input type="number" name="length" placeholder="Watermark length" required><br><br>
    <button type="submit">Extract</button>
</form>

</body>
</html>
